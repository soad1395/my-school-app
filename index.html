 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الإتقان الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التنسيق الأصلي الخاص بكِ بدون أي تغيير */
        :root {
            --primary-color: #1a237e;
            --secondary-color: #ffd700;
            --text-color: #333;
            --bg-color: #f4f4f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            border-top: 10px solid var(--secondary-color);
        }

        h1 { color: var(--primary-color); text-align: center; margin-bottom: 25px; }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus { border-color: var(--primary-color); }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.3s;
        }

        .add-btn { background-color: var(--primary-color); color: white; }
        .add-btn:hover { background-color: #0d144a; transform: scale(1.05); }

        .class-selector { margin-bottom: 20px; width: 100%; }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #ddd;
            background-color: white;
            font-size: 16px;
        }

        .student-list { list-style: none; padding: 0; }
        .student-item {
            background-color: #f9f9f9;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 5px solid var(--primary-color);
        }

        .delete-btn { color: #ff4d4d; cursor: pointer; font-size: 18px; }
        .delete-btn:hover { color: #cc0000; }
        
        .save-indicator {
            font-size: 12px;
            color: green;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>منصة الإتقان الذكي 🎓</h1>
        
        <div class="class-selector">
            <select id="classSelect" onchange="loadStudents()">
                <option value="class1">فصل أولى / 1</option>
                <option value="class2">فصل أولى / 2</option>
                <option value="class3">فصل ثانية / 1</option>
                <option value="class4">فصل ثانية / 2</option>
            </select>
        </div>

        <div class="input-group">
            <input type="text" id="studentName" placeholder="أدخلي اسم الطالبة...">
            <button class="add-btn" onclick="addStudent()">إضافة</button>
        </div>

        <ul id="studentList" class="student-list">
            </ul>
        
        <div id="saveMsg" class="save-indicator">تم حفظ البيانات تلقائياً ✅</div>
    </div>

    <script>
        // الكود البرمجي مع ميزة الحفظ التلقائي
        let allData = JSON.parse(localStorage.getItem('smartSoadData')) || {
            class1: [], class2: [], class3: [], class4: []
        };

        // تحميل الأسماء فور فتح الصفحة أو تغيير الفصل
        window.onload = loadStudents;

        function loadStudents() {
            const currentClass = document.getElementById('classSelect').value;
            const listElement = document.getElementById('studentList');
            listElement.innerHTML = '';

            allData[currentClass].forEach((student, index) => {
                const li = document.createElement('li');
                li.className = 'student-item';
                li.innerHTML = `
                    <span>${student}</span>
                    <i class="fas fa-trash-alt delete-btn" onclick="deleteStudent(${index})"></i>
                `;
                listElement.appendChild(li);
            });
        }

        function addStudent() {
            const input = document.getElementById('studentName');
            const name = input.value.trim();
            const currentClass = document.getElementById('classSelect').value;

            if (name !== "") {
                allData[currentClass].push(name);
                input.value = "";
                saveAndRefresh();
            }
        }

        function deleteStudent(index) {
            const currentClass = document.getElementById('classSelect').value;
            allData[currentClass].splice(index, 1);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            // حفظ في ذاكرة المتصفح
            localStorage.setItem('smartSoadData', JSON.stringify(allData));
            loadStudents();
            
            // إظهار رسالة تأكيد الحفظ
            const msg = document.getElementById('saveMsg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 2000);
        }

        // دعم زر Enter للإضافة
        document.getElementById('studentName').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addStudent();
        });
    </script>
</body>
</html>
