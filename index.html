<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الإتقان الذكي - إدارة الفصول</title>
    <style>
        :root {
            --primary-color: #1a237e; /* أزرق ملكي */
            --accent-color: #ffd700;  /* ذهبي */
            --bg-gradient: linear-gradient(135deg, #1a237e 0%, #4b0082 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid var(--accent-color);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-add {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-add:hover { background-color: #0d144a; }

        .student-list {
            list-style: none;
            padding: 0;
        }

        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            margin-bottom: 10px;
            border-radius: 12px;
            border-right: 5px solid var(--primary-color);
        }

        .btn-delete {
            background-color: #ff4d4d;
            color: white;
            font-size: 12px;
        }

        .save-status {
            text-align: center;
            font-size: 12px;
            color: #4caf50;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>منصة الإتقان الذكي 🎓</h1>
    
    <div class="input-group">
        <input type="text" id="studentName" placeholder="أدخلي اسم الطالبة هنا...">
        <button class="btn-add" onclick="addStudent()">إضافة طالبة</button>
    </div>

    <div id="saveStatus" class="save-status">تم حفظ التغييرات تلقائياً ✅</div>

    <ul id="listContainer" class="student-list">
        </ul>
</div>

<script>
    // 1. استعادة البيانات عند تحميل الصفحة
    let students = JSON.parse(localStorage.getItem('mySchoolData')) || [];

    // تنفيذ العرض فور فتح الصفحة
    window.onload = function() {
        renderStudents();
    };

    // 2. دالة إضافة طالبة
    function addStudent() {
        const nameInput = document.getElementById('studentName');
        const name = nameInput.value.trim();

        if (name === "") {
            alert("يرجى كتابة الاسم");
            return;
        }

        students.push({ id: Date.now(), name: name });
        nameInput.value = ""; // مسح الحقل
        
        saveAndRender();
    }

    // 3. دالة حذف طالبة
    function deleteStudent(id) {
        students = students.filter(student => student.id !== id);
        saveAndRender();
    }

    // 4. دالة الحفظ في التخزين المحلي LocalStorage
    function saveAndRender() {
        localStorage.setItem('mySchoolData', JSON.stringify(students));
        renderStudents();
        
        // إظهار إشعار الحفظ
        const status = document.getElementById('saveStatus');
        status.style.display = 'block';
        setTimeout(() => status.style.display = 'none', 2000);
    }

    // 5. دالة تحديث واجهة المستخدم
    function renderStudents() {
        const list = document.getElementById('listContainer');
        list.innerHTML = "";

        students.forEach(student => {
            const li = document.createElement('li');
            li.className = 'student-item';
            li.innerHTML = `
                <span>${student.name}</span>
                <button class="btn-delete" onclick="deleteStudent(${student.id})">حذف</button>
            `;
            list.appendChild(li);
        });
    }

    // السماح بالإضافة عند الضغط على مفتاح Enter
    document.getElementById('studentName').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            addStudent();
        }
    });
</script>

</body>
</html>
